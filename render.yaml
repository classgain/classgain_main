services:
  - type: web
    name: what-next-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      # Comma-separated list of every deployed frontend origin. This is the
      # simplest option when only one or two of the frontends are deployed.
      - key: FRONTEND_URLS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: SELLER_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        sync: false
      - key: JSON_BODY_LIMIT
        value: 140mb
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: MONGO_RETRY_DELAY_MS
        value: 10000
